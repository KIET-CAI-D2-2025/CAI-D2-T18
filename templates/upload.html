<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload or Record Audio</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h1>Upload or Record Audio</h1>
            </div>

            {% if success %}
                <div class="success-message">
                    <h2>Success!</h2>
                    <p>Your audio file "{{ filename }}" has been uploaded successfully!</p>
                    <a href="/">Upload Another File</a>
                </div>
            {% else %}
                <div class="options">
                    <!-- File Upload Option -->
                    <div class="option upload">
                        <h3>Upload an Audio File</h3>
                        <form action="/" method="POST" enctype="multipart/form-data">
                            <input type="file" name="file" accept=".mp3,.wav,.ogg" required>
                            <button type="submit" class="btn btn-upload">Upload File</button>
                        </form>
                    </div>

                    <!-- Audio Record Option -->
                    <div class="option record">
                        <h3>Record Your Audio</h3>
                        <button id="record-btn" class="btn btn-record">Start Recording</button>
                        <button id="stop-btn" class="btn btn-stop" style="display:none;">Stop Recording</button>
                        <form action="/" method="POST" id="audio-form" style="display:none;">
                            <input type="hidden" name="audio_data" id="audio-data">
                            <button type="submit" class="btn btn-save">Save Recorded Audio</button>
                        </form>
                    </div>
                </div>
            {% endif %}
        </div>
    </div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        // Handle audio recording
        document.getElementById('record-btn').addEventListener('click', startRecording);
        document.getElementById('stop-btn').addEventListener('click', stopRecording);

        function startRecording() {
            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function (stream) {
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.start();
                    document.getElementById('record-btn').style.display = 'none';
                    document.getElementById('stop-btn').style.display = 'inline-block';

                    mediaRecorder.ondataavailable = function (event) {
                        audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = function () {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                        const audioData = audioBlob;

                        // Convert audio to base64 and send it to the server
                        const reader = new FileReader();
                        reader.readAsDataURL(audioData);
                        reader.onloadend = function () {
                            document.getElementById('audio-data').value = reader.result.split(',')[1];
                            document.getElementById('audio-form').submit();
                        };
                    };
                });
        }

        function stopRecording() {
            mediaRecorder.stop();
            document.getElementById('stop-btn').style.display = 'none';
            document.getElementById('record-btn').style.display = 'inline-block';
        }
    </script>
</body>
</html>
